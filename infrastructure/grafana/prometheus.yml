global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "copilot-backend"
    static_configs:
      - targets: ["copilot-backend-svc:8000"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: "copilot-worker"
    static_configs:
      - targets: ["copilot-worker:9090"]
    scrape_interval: 30s

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
