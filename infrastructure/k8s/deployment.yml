---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: copilot-backend
  labels:
    app: copilot-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: copilot-backend
  template:
    metadata:
      labels:
        app: copilot-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/arthikhs/ai-engineering-copilot-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: copilot-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: copilot-backend-svc
spec:
  selector:
    app: copilot-backend
  ports:
    - port: 8000
      targetPort: 8000
---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: copilot-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: copilot-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: copilot-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: copilot-frontend
  template:
    metadata:
      labels:
        app: copilot-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/arthikhs/ai-engineering-copilot-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: copilot-frontend-svc
spec:
  selector:
    app: copilot-frontend
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
---
# Celery Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: copilot-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: copilot-worker
  template:
    metadata:
      labels:
        app: copilot-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/arthikhs/ai-engineering-copilot-backend:latest
          command: ["celery", "-A", "worker.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
          envFrom:
            - secretRef:
                name: copilot-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: copilot-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - your-domain.com
      secretName: copilot-tls
  rules:
    - host: your-domain.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: copilot-backend-svc
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: copilot-frontend-svc
                port:
                  number: 80
