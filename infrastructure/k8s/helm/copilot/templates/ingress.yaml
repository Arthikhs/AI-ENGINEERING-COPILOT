{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "copilot.fullname" . }}-ingress
  namespace: {{ .Values.global.namespace }}
  annotations:
    {{- range $k, $v := .Values.ingress.annotations }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "copilot.fullname" . }}-backend-svc
                port:
                  number: {{ .Values.backend.service.port }}
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: {{ include "copilot.fullname" . }}-backend-svc
                port:
                  number: {{ .Values.backend.service.port }}
          - path: /webhooks
            pathType: Prefix
            backend:
              service:
                name: {{ include "copilot.fullname" . }}-backend-svc
                port:
                  number: {{ .Values.backend.service.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "copilot.fullname" . }}-frontend-svc
                port:
                  number: {{ .Values.frontend.service.port }}
{{- end }}
