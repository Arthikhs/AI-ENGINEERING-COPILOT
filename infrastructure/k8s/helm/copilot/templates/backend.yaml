# ─── Backend Deployment ───────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "copilot.fullname" . }}-backend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "copilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
    {{- if .Values.blueGreen.enabled }}
    slot: {{ .Values.blueGreen.activeSlot }}
    {{- end }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: copilot-backend
      {{- if .Values.blueGreen.enabled }}
      slot: {{ .Values.blueGreen.activeSlot }}
      {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: copilot-backend
        {{- if .Values.blueGreen.enabled }}
        slot: {{ .Values.blueGreen.activeSlot }}
        {{- end }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: backend
          image: {{ include "copilot.backendImage" . }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.secretName }}
          env:
            {{- range $k, $v := .Values.backend.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.backend.livenessProbe.path }}
              port: 8000
            initialDelaySeconds: {{ .Values.backend.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.livenessProbe.periodSeconds }}
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.backend.readinessProbe.path }}
              port: 8000
            initialDelaySeconds: {{ .Values.backend.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.readinessProbe.periodSeconds }}
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "copilot.fullname" . }}-backend-svc
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: copilot-backend
    {{- if .Values.blueGreen.enabled }}
    slot: {{ .Values.blueGreen.activeSlot }}
    {{- end }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: 8000
      protocol: TCP
  type: {{ .Values.backend.service.type }}
