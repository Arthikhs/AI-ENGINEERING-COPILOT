# ─── Celery Worker Deployment ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "copilot.fullname" . }}-worker
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "copilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app: copilot-worker
  template:
    metadata:
      labels:
        app: copilot-worker
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: worker
          image: {{ include "copilot.backendImage" . }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            - celery
            - -A
            - worker.celery_app
            - worker
            - --loglevel=info
            - --concurrency={{ .Values.worker.concurrency }}
            - --max-tasks-per-child=100
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.secretName }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - worker.celery_app
                - inspect
                - ping
                - -d
                - celery@$HOSTNAME
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
---
# ─── Celery Beat Scheduler ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "copilot.fullname" . }}-beat
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: 1   # Only 1 beat scheduler — never scale
  selector:
    matchLabels:
      app: copilot-beat
  template:
    metadata:
      labels:
        app: copilot-beat
    spec:
      containers:
        - name: beat
          image: {{ include "copilot.backendImage" . }}
          command:
            - celery
            - -A
            - worker.celery_app
            - beat
            - --loglevel=info
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.secretName }}
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
{{- if .Values.worker.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "copilot.fullname" . }}-worker-hpa
  namespace: {{ .Values.global.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "copilot.fullname" . }}-worker
  minReplicas: {{ .Values.worker.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.worker.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.worker.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
